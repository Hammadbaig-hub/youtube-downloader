<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — VidFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    /* ── Login-page-specific styles ─────────────────────────────────── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
    }

    /* Card */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 36px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .45);
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--text);
      text-decoration: none;
    }
    .login-logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 6px var(--accent-subtle);
    }
    .login-logo-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    /* Headings */
    .login-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.6px;
      margin-bottom: 10px;
    }
    .login-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 36px;
    }

    /* Google button */
    .google-btn {
      width: 100%;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #3c4043;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 18px;
      box-shadow:
        0 1px 3px rgba(0, 0, 0, .2),
        0 4px 12px rgba(0, 0, 0, .1);
      transition: box-shadow .2s, transform .15s;
    }
    .google-btn:hover {
      box-shadow:
        0 2px 6px rgba(0, 0, 0, .25),
        0 8px 24px rgba(0, 0, 0, .15);
      transform: translateY(-1px);
    }
    .google-btn:active { transform: scale(.98); }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Guest button */
    .guest-btn {
      width: 100%;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 32px;
      transition: border-color .2s, color .2s, background .2s;
    }
    .guest-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--bg-input);
    }
    .guest-btn svg { width: 16px; height: 16px; }

    /* Guest note */
    .guest-note {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 24px;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    /* Footer */
    .login-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .login-footer svg {
      width: 13px;
      height: 13px;
      color: var(--success);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <a href="/" class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        VidFlow
      </a>

      <h2 class="login-title">Welcome to VidFlow</h2>
      <p class="login-sub">Sign in to track your downloads and access your history across devices.</p>

      <!-- Google Sign In -->
      <a href="/auth/google" class="google-btn">
        <!-- Official Google G logo -->
        <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
        </svg>
        Continue with Google
      </a>

      <div class="login-divider">or</div>

      <div class="guest-note">
        Continue as guest to download without saving history.<br />
        Downloads work fully — just no cross-device sync.
      </div>

      <!-- Guest Mode -->
      <a href="/" class="guest-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Continue as Guest
      </a>

      <!-- Trust note -->
      <div class="login-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Your data is never shared or sold
      </div>

    </div>
  </div>
</body>
</html>
