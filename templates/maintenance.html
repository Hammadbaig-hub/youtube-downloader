<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance — VidFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .wrap { text-align: center; padding: 2rem; max-width: 520px; }
    .icon {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;
      box-shadow: 0 0 40px rgba(99,102,241,.4);
    }
    .icon svg { color: #fff; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: .75rem; }
    p {
      color: #9ca3af; font-size: 1.0625rem; line-height: 1.7; margin-bottom: 2rem;
      white-space: pre-line;
    }
    .badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      color: #818cf8; padding: .5rem 1.25rem; border-radius: 999px; font-size: .875rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Under Maintenance</h1>
    <p>{{ message }}</p>
    <div class="badge">
      <div class="dot"></div>
      We'll be back shortly
    </div>
  </div>
</body>
</html>
