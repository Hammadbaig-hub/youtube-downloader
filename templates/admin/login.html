<!DOCTYPE html>
<html lang="en" data-theme="{{ admin_theme }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — VidFlow</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/admin.css">
  <script>(function(){ var t=localStorage.getItem('vf_admin_theme')||'{{ admin_theme }}'; document.documentElement.setAttribute('data-theme',t); })();</script>
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ad-bg, #000); }
    .login-card {
      width: 100%; max-width: 400px; margin: 2rem;
      background: var(--ad-card, #111); border: 1px solid var(--ad-border, rgba(255,255,255,.08));
      border-radius: 16px; padding: 2.5rem; box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .login-logo {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--ad-accent, #ff0000); display: flex; align-items: center; justify-content: center;
    }
    .login-logo-icon svg { fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }
    .login-logo-text { font-size: 1.25rem; font-weight: 700; color: #fff; }
    .login-logo-badge {
      font-size: .65rem; background: rgba(255,0,0,.15); color: #ff7777;
      padding: .15rem .5rem; border-radius: 999px; font-weight: 600; margin-left: .25rem;
      vertical-align: middle;
    }
    .login-title { font-size: 1.5rem; font-weight: 700; color: var(--ad-text, #fff); margin-bottom: .25rem; }
    .login-sub { font-size: .875rem; color: var(--ad-muted, #6b7280); margin-bottom: 2rem; }
    .login-form .form-group { margin-bottom: 1.25rem; }
    .login-form label { display: block; font-size: .8125rem; font-weight: 500; color: var(--ad-text, #d1d5db); margin-bottom: .5rem; }
    .login-form input {
      width: 100%; padding: .75rem 1rem; background: var(--ad-card2, #1a1a1a); border: 1px solid var(--ad-border, rgba(255,255,255,.1));
      border-radius: 10px; color: var(--ad-text, #fff); font-size: .9375rem; outline: none; box-sizing: border-box;
      transition: border-color .2s;
    }
    .login-form input:focus { border-color: var(--ad-accent, #ff0000); }
    .login-btn {
      width: 100%; padding: .875rem; background: var(--ad-accent, #ff0000); color: #fff;
      border: none; border-radius: 10px; font-size: .9375rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s; margin-top: .5rem;
    }
    .login-btn:hover  { background: var(--ad-accent-h, #cc0000); }
    .login-btn:active { transform: scale(.98); }
    .login-error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      color: #f87171; padding: .75rem 1rem; border-radius: 10px;
      font-size: .875rem; margin-bottom: 1.25rem; display: flex; gap: .5rem; align-items: flex-start;
    }
    .login-error svg { flex-shrink: 0; margin-top: 1px; }
    .login-back { text-align: center; margin-top: 1.5rem; font-size: .8125rem; color: var(--ad-muted, #6b7280); }
    .login-back a { color: var(--ad-accent, #ff0000); text-decoration: none; }
    .login-back a:hover { text-decoration: underline; }
    .lockout-badge {
      display: inline-block; background: rgba(245,158,11,.1); color: #fbbf24;
      border: 1px solid rgba(245,158,11,.2); border-radius: 8px;
      padding: .5rem .75rem; font-size: .8125rem; margin-bottom: 1.25rem; width: 100%; box-sizing: border-box;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M3 5 Q7 15 12 18 Q17 15 21 5"/>
          <path d="M12 18 L12 22 M9 22 L15 22"/>
        </svg>
      </div>
      <span class="login-logo-text">VidFlow <span class="login-logo-badge">ADMIN</span></span>
    </div>

    <div class="login-title">Admin Sign In</div>
    <div class="login-sub">Access restricted to authorized administrators only.</div>

    {% if lockout_remaining > 0 %}
    <div class="lockout-badge">
      Locked — try again in <span id="lockoutTimer" data-seconds="{{ lockout_remaining }}">{{ lockout_remaining // 60 }}m {{ lockout_remaining % 60 }}s</span>
    </div>
    {% endif %}

    {% if error %}
    <div class="login-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form class="login-form" method="POST" action="/admin/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" {% if lockout_remaining > 0 %}disabled{% endif %}>Sign In</button>
    </form>

    <div class="login-back"><a href="/">← Back to VidFlow</a></div>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
