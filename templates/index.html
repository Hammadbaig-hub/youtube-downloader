<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #ff0000;
      --red2:       #ff4444;
      --red-glow:   rgba(255,0,0,.22);
      --green:      #22c55e;
      --yellow:     #f59e0b;
      --err:        #ef4444;
      --text:       #f1f1f1;
      --muted:      #888;
      --muted2:     #555;
      --radius:     16px;
    }

    /* ── Background ─────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Glowing orb behind card */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,0,0,.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle dot grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #222 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
    }

    /* ── Logo ───────────────────────────────────────────────────────────── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
      user-select: none;
    }
    .logo-ring {
      width: 64px; height: 64px;
      margin: 0 auto 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 8px rgba(255,0,0,.08), 0 0 40px rgba(255,0,0,.3);
    }
    .logo-ring svg { width: 30px; height: 30px; fill: #fff; }
    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.6px;
      background: linear-gradient(135deg, #fff 30%, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: var(--muted); font-size: 14px; margin-top: 5px; }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 32px 64px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
      margin-bottom: 12px;
    }

    /* ── URL input ──────────────────────────────────────────────────────── */
    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .input-icon svg { width: 18px; height: 18px; fill: var(--muted2); display: block; }

    .url-input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .url-input::placeholder { color: var(--muted2); }
    .url-input:focus {
      border-color: rgba(255,0,0,.6);
      background: rgba(255,255,255,.07);
      box-shadow: 0 0 0 3px rgba(255,0,0,.12);
    }

    /* ── Thumbnail preview ──────────────────────────────────────────────── */
    #thumb-wrap {
      display: none;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #111;
    }
    #thumb-wrap.show { display: block; }
    #thumb-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    #thumb-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 12px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Quality pills ──────────────────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .q-pill {
      padding: 9px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .q-pill:hover {
      border-color: rgba(255,0,0,.4);
      color: var(--text);
      background: rgba(255,0,0,.07);
    }
    .q-pill.active {
      border-color: var(--red);
      background: rgba(255,0,0,.15);
      color: #fff;
      box-shadow: 0 0 0 1px var(--red);
    }
    .q-pill .pill-label { display: block; font-size: 11px; font-weight: 400; color: inherit; opacity: .7; margin-top: 2px; }

    /* ── Download button ────────────────────────────────────────────────── */
    .btn-dl {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(255,0,0,.35);
      transition: opacity .15s, transform .1s, box-shadow .15s;
    }
    .btn-dl::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .btn-dl:hover::before { opacity: 1; }
    .btn-dl:hover { box-shadow: 0 6px 32px rgba(255,0,0,.5); }
    .btn-dl:active { transform: scale(.98); }
    .btn-dl:disabled {
      background: #1e1e1e;
      box-shadow: none;
      cursor: not-allowed;
      color: #444;
      transform: none;
    }
    .btn-dl svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

    /* ── Progress card ──────────────────────────────────────────────────── */
    #prog-card { display: none; }
    #prog-card.show { display: block; }

    /* Header row: badge + title */
    .prog-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px; font-weight: 700; letter-spacing: .5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-starting    { background: rgba(255,255,255,.07); color: #777; }
    .badge-downloading { background: rgba(245,158,11,.15);  color: var(--yellow); }
    .badge-processing  { background: rgba(245,158,11,.15);  color: var(--yellow); }
    .badge-done        { background: rgba(34,197,94,.15);   color: var(--green); }
    .badge-error       { background: rgba(239,68,68,.15);   color: var(--err); }
    .badge-starting .dot,
    .badge-downloading .dot,
    .badge-processing .dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    #vid-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }

    /* Progress bar */
    .bar-track {
      height: 5px;
      background: rgba(255,255,255,.07);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #ff0000, #ff6b35, #ffaa00);
      background-size: 200% 100%;
      transition: width .4s ease;
      width: 0%;
    }
    .bar-fill.indeterminate {
      width: 40% !important;
      animation: sweep 1.4s ease-in-out infinite;
    }
    .bar-fill.complete { background: linear-gradient(90deg, #22c55e, #4ade80); }
    @keyframes sweep {
      0%   { transform: translateX(-130%); }
      100% { transform: translateX(320%); }
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      padding: 10px 10px 8px;
      text-align: center;
    }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); margin-bottom: 4px; }
    .stat-value { font-size: 13px; font-weight: 600; color: var(--text); }

    /* Done / Error banners */
    .banner {
      border-radius: 12px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 500;
    }
    .banner-done  { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.25); color: var(--green); }
    .banner-error { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.2);  color: var(--err); font-size: 13px; line-height: 1.55; }
    .banner svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    .banner-action {
      margin-left: auto; font-size: 13px; font-weight: 600;
      text-decoration: underline; cursor: pointer; white-space: nowrap; color: inherit;
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      margin-top: 24px;
      font-size: 12px;
      color: #333;
      text-align: center;
      position: relative; z-index: 1;
    }
    footer a { color: #444; text-decoration: none; }
    footer a:hover { color: #666; }

    /* ── Shake ──────────────────────────────────────────────────────────── */
    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      20%    { transform:translateX(-7px) }
      40%    { transform:translateX(7px) }
      60%    { transform:translateX(-4px) }
      80%    { transform:translateX(4px) }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h1>YT Downloader</h1>
    <p>Download YouTube videos &amp; music in seconds</p>
  </div>

  <!-- Input card -->
  <div class="card">

    <!-- URL -->
    <div class="input-wrap">
      <div class="input-icon">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <input class="url-input" id="url" type="text"
             placeholder="Paste YouTube link here…"
             autocomplete="off" spellcheck="false" />
    </div>

    <!-- Thumbnail preview -->
    <div id="thumb-wrap">
      <img id="thumb-img" alt="" />
      <div id="thumb-overlay"></div>
    </div>

    <!-- Quality -->
    <div class="section-label">Quality</div>
    <div class="quality-grid" id="quality-grid">
      {% for key, opt in qualities.items() %}
      <button class="q-pill {% if key == '1' %}active{% endif %}"
              data-key="{{ key }}" onclick="selectQuality(this)">
        {{ opt.name }}
      </button>
      {% endfor %}
    </div>

    <!-- Button -->
    <button class="btn-dl" id="dl-btn" onclick="startDownload()">
      <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18v12.17l-4.59-4.58L6 11l6 6 6-6-1.41-1.41L13 14.17V2h-1z"/></svg>
      Download
    </button>
  </div>

  <!-- Progress card -->
  <div class="card" id="prog-card">

    <div class="prog-header">
      <div class="badge badge-starting" id="badge">
        <div class="dot"></div>
        <span id="badge-text">Starting</span>
      </div>
      <div id="vid-title"></div>
    </div>

    <div class="bar-track">
      <div class="bar-fill indeterminate" id="bar"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Speed</div><div class="stat-value" id="s-speed">—</div></div>
      <div class="stat-box"><div class="stat-label">ETA</div><div class="stat-value" id="s-eta">—</div></div>
      <div class="stat-box"><div class="stat-label">Size</div><div class="stat-value" id="s-size">—</div></div>
      <div class="stat-box"><div class="stat-label">Done</div><div class="stat-value" id="s-pct">0%</div></div>
    </div>

    <div class="banner banner-done" id="msg-done" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M9 16.2l-4.2-4.2-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
      Downloaded successfully!
      <span class="banner-action" onclick="retryDownload()">Save again</span>
    </div>

    <div class="banner banner-error" id="msg-error" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="err-text"></span>
    </div>

  </div>

  <footer>Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a> &nbsp;·&nbsp; Flask</footer>
</div>

<script>
  let currentJobId = null;
  let pollTimer    = null;
  let selectedKey  = '1';

  /* ── Quality pills ──────────────────────────────────────────────────────── */
  function selectQuality(btn) {
    document.querySelectorAll('.q-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedKey = btn.dataset.key;
  }

  /* ── Thumbnail preview ──────────────────────────────────────────────────── */
  function extractVideoId(url) {
    const m = url.match(/[?&]v=([^&#]{11})/) || url.match(/youtu\.be\/([^?&#]{11})/);
    return m ? m[1] : null;
  }

  function updateThumb(url) {
    const vid = extractVideoId(url);
    const wrap = document.getElementById('thumb-wrap');
    if (!vid) { wrap.classList.remove('show'); return; }
    const img = document.getElementById('thumb-img');
    img.src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
    img.onerror = () => wrap.classList.remove('show');
    img.onload  = () => wrap.classList.add('show');
    document.getElementById('thumb-overlay').textContent = '';
  }

  document.getElementById('url').addEventListener('input', e => updateThumb(e.target.value.trim()));
  document.getElementById('url').addEventListener('paste', e => {
    setTimeout(() => updateThumb(document.getElementById('url').value.trim()), 0);
  });

  /* ── Start download ─────────────────────────────────────────────────────── */
  async function startDownload() {
    const url = document.getElementById('url').value.trim();
    if (!url) { shake(document.getElementById('url')); return; }

    currentJobId = null;
    clearTimeout(pollTimer);
    resetProgress();
    document.getElementById('prog-card').classList.add('show');
    setBtn(true);

    try {
      const res  = await fetch('/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, quality: selectedKey }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      currentJobId = data.job_id;
      schedulePoll();
    } catch (err) {
      showError(err.message);
      setBtn(false);
    }
  }

  /* ── Poll ───────────────────────────────────────────────────────────────── */
  function schedulePoll() { pollTimer = setTimeout(doPoll, 600); }

  async function doPoll() {
    if (!currentJobId) return;
    try {
      const data = await fetch('/progress/' + currentJobId).then(r => r.json());
      applyUpdate(data);
      if (data.status !== 'done' && data.status !== 'error') schedulePoll();
    } catch (_) { schedulePoll(); }
  }

  /* ── Apply update ───────────────────────────────────────────────────────── */
  function applyUpdate(d) {
    setBadge(d.status);
    if (d.title) {
      document.getElementById('vid-title').textContent = d.title;
      document.getElementById('thumb-overlay').textContent = d.title;
    }

    if (d.status === 'starting') {
      indeterminate(true);

    } else if (d.status === 'downloading') {
      indeterminate(false);
      setBar(d.percent || 0, false);
      setText('s-speed', d.speed  || '—');
      setText('s-eta',   d.eta    || '—');
      setText('s-size',  d.size   || '—');
      setText('s-pct',   (d.percent || 0).toFixed(1) + '%');

    } else if (d.status === 'processing') {
      indeterminate(true);
      setText('s-pct', '…');

    } else if (d.status === 'done') {
      indeterminate(false);
      setBar(100, true);
      setText('s-pct', '100%');
      document.getElementById('msg-done').style.display = 'flex';
      setBtn(false);
      triggerDownload(currentJobId);

    } else if (d.status === 'error') {
      indeterminate(false);
      showError(d.error || 'Download failed.');
      setBtn(false);
    }
  }

  /* ── Trigger file save ──────────────────────────────────────────────────── */
  function triggerDownload(id) {
    const a = Object.assign(document.createElement('a'), { href: '/download/' + id, style: 'display:none' });
    document.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 1000);
  }
  function retryDownload() { if (currentJobId) triggerDownload(currentJobId); }

  /* ── UI helpers ─────────────────────────────────────────────────────────── */
  const BADGES = {
    starting:    ['badge-starting',    'Starting…'],
    downloading: ['badge-downloading', 'Downloading'],
    processing:  ['badge-processing',  'Processing'],
    done:        ['badge-done',        'Complete'],
    error:       ['badge-error',       'Error'],
  };
  function setBadge(s) {
    const [cls, label] = BADGES[s] || ['badge-starting', s];
    const el = document.getElementById('badge');
    el.className = 'badge ' + cls;
    document.getElementById('badge-text').textContent = label;
  }
  function setBar(pct, done) {
    const b = document.getElementById('bar');
    b.style.width = pct + '%';
    b.classList.toggle('complete', done);
  }
  function indeterminate(on) { document.getElementById('bar').classList.toggle('indeterminate', on); }
  function setText(id, v) { document.getElementById(id).textContent = v; }
  function setBtn(off) { document.getElementById('dl-btn').disabled = off; }
  function showError(msg) {
    setBadge('error');
    const el = document.getElementById('msg-error');
    document.getElementById('err-text').textContent = msg;
    el.style.display = 'flex';
  }
  function resetProgress() {
    setBadge('starting');
    setText('vid-title', '');
    setText('s-speed', '—'); setText('s-eta', '—');
    setText('s-size', '—');  setText('s-pct', '0%');
    indeterminate(true);
    setBar(0, false);
    document.getElementById('bar').classList.remove('complete');
    document.getElementById('msg-done').style.display  = 'none';
    document.getElementById('msg-error').style.display = 'none';
  }
  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake .35s ease';
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });
</script>
</body>
</html>
