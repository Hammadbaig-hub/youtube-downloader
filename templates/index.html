<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #141414;
      --card:       #1c1c1c;
      --input-bg:   #242424;
      --border:     #2e2e2e;
      --border-focus: #ff0000;
      --red:        #ff0000;
      --red-dim:    #cc0000;
      --red-glow:   rgba(255,0,0,.18);
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,.15);
      --yellow:     #f59e0b;
      --yellow-dim: rgba(245,158,11,.15);
      --blue:       #3b82f6;
      --err:        #ef4444;
      --err-dim:    rgba(239,68,68,.15);
      --text:       #f0f0f0;
      --muted:      #888;
      --radius:     12px;
      --shadow:     0 24px 48px rgba(0,0,0,.5);
    }

    /* ── Base ───────────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Logo ───────────────────────────────────────────────────────────── */
    .logo {
      text-align: center;
      margin-bottom: 32px;
      user-select: none;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--red);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 0 32px var(--red-glow);
    }
    .logo-icon svg { width: 26px; height: 26px; fill: #fff; }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    .logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: var(--shadow);
    }
    .card + .card { margin-top: 14px; }

    /* ── Form elements ──────────────────────────────────────────────────── */
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      appearance: none;
    }
    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus,
    select:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--muted);
      pointer-events: none;
    }
    .select-wrap select { padding-right: 36px; cursor: pointer; }

    /* ── Download button ────────────────────────────────────────────────── */
    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(255,0,0,.3);
      margin-top: 6px;
    }
    .btn-download svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }
    .btn-download:hover  { background: var(--red-dim); box-shadow: 0 4px 28px rgba(255,0,0,.45); }
    .btn-download:active { transform: scale(.98); }
    .btn-download:disabled {
      background: #333;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
      color: #666;
    }
    .btn-download:disabled svg { fill: #666; }

    /* ── Progress card ──────────────────────────────────────────────────── */
    #progress-card { display: none; }
    #progress-card.show { display: block; }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-starting    { background: rgba(255,255,255,.07); color: var(--muted); }
    .badge-downloading { background: var(--yellow-dim);     color: var(--yellow); }
    .badge-processing  { background: var(--yellow-dim);     color: var(--yellow); }
    .badge-done        { background: var(--green-dim);      color: var(--green);  }
    .badge-error       { background: var(--err-dim);        color: var(--err);    }

    .badge-starting .dot,
    .badge-downloading .dot,
    .badge-processing .dot { animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Video title */
    .video-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 22px;
    }

    /* Progress bar */
    .bar-track {
      background: var(--input-bg);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #ff0000, #ff6b35);
      transition: width .35s ease;
      width: 0%;
    }
    .bar-fill.indeterminate {
      width: 35% !important;
      animation: slide 1.3s ease-in-out infinite;
    }
    .bar-fill.complete {
      background: linear-gradient(90deg, var(--green), #4ade80);
    }
    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(400%); }
    }

    /* Stats row */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .stat-val { color: var(--text); font-weight: 500; }

    /* Success / error messages */
    .msg-done {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--green-dim);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--green);
    }
    .msg-done svg { width: 18px; height: 18px; fill: var(--green); flex-shrink: 0; }

    .msg-error {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--err-dim);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      font-size: 13px;
      color: var(--err);
      line-height: 1.5;
    }

    /* Re-download link inside success banner */
    .retry-link {
      margin-left: auto;
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      margin-top: 28px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Logo -->
<div class="logo">
  <div class="logo-icon">
    <!-- YouTube play icon -->
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>
  <h1>YT Downloader</h1>
  <p>Download YouTube videos &amp; audio instantly</p>
</div>

<!-- Input card -->
<div class="card">
  <div class="field">
    <label for="url">YouTube URL</label>
    <input type="text" id="url"
           placeholder="https://www.youtube.com/watch?v=..."
           autocomplete="off" spellcheck="false" />
  </div>

  <div class="field">
    <label for="quality">Quality</label>
    <div class="select-wrap">
      <select id="quality">
        {% for key, opt in qualities.items() %}
        <option value="{{ key }}">{{ opt.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <button class="btn-download" id="dl-btn" onclick="startDownload()">
    <!-- Download arrow icon -->
    <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18v12.17l-4.59-4.58L6 11l6 6 6-6-1.41-1.41L13 14.17V2h-1z"/></svg>
    Download
  </button>
</div>

<!-- Progress card (hidden until a job starts) -->
<div class="card" id="progress-card">

  <!-- Status badge -->
  <div class="badge badge-starting" id="badge">
    <div class="dot"></div>
    <span id="badge-text">Starting</span>
  </div>

  <!-- Video title -->
  <div class="video-title" id="vid-title"></div>

  <!-- Progress bar -->
  <div class="bar-track">
    <div class="bar-fill indeterminate" id="bar"></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <span>Speed&nbsp;<span class="stat-val" id="s-speed">—</span></span>
    <span>ETA&nbsp;<span class="stat-val" id="s-eta">—</span></span>
    <span>Size&nbsp;<span class="stat-val" id="s-size">—</span></span>
    <span><span class="stat-val" id="s-pct">0 %</span></span>
  </div>

  <!-- Done banner -->
  <div class="msg-done" id="msg-done" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M9 16.2l-4.2-4.2-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
    File downloaded successfully!
    <span class="retry-link" id="retry-link" onclick="retryDownload()">Download again</span>
  </div>

  <!-- Error banner -->
  <div class="msg-error" id="msg-error" style="display:none"></div>

</div>

<footer>Powered by yt-dlp &nbsp;·&nbsp; Flask</footer>

<script>
  /* ── State ──────────────────────────────────────────────────────────────── */
  let currentJobId  = null;
  let pollTimer     = null;

  /* ── Start download ─────────────────────────────────────────────────────── */
  async function startDownload() {
    const url     = document.getElementById('url').value.trim();
    const quality = document.getElementById('quality').value;

    if (!url) {
      shake(document.getElementById('url'));
      return;
    }

    // Reset UI to "starting" state
    currentJobId = null;
    clearTimeout(pollTimer);
    resetProgressUI();
    showProgressCard(true);
    setBtn(true);

    try {
      const res  = await fetch('/start', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ url, quality }),
      });
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      currentJobId = data.job_id;
      schedulePoll();

    } catch (err) {
      showError(err.message);
      setBtn(false);
    }
  }

  /* ── Polling ────────────────────────────────────────────────────────────── */
  function schedulePoll() {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(doPoll, 600);
  }

  async function doPoll() {
    if (!currentJobId) return;
    try {
      const res  = await fetch('/progress/' + currentJobId);
      const data = await res.json();
      applyUpdate(data);
      if (data.status !== 'done' && data.status !== 'error') schedulePoll();
    } catch (_) {
      schedulePoll(); // network blip — keep trying
    }
  }

  /* ── Apply server update to UI ──────────────────────────────────────────── */
  function applyUpdate(d) {
    const { status, percent, title, speed, eta, size } = d;

    setBadge(status);
    if (title) setText('vid-title', title);

    if (status === 'starting') {
      setBarIndeterminate(true);

    } else if (status === 'downloading') {
      setBarIndeterminate(false);
      setBarWidth(percent || 0, false);
      setText('s-speed', speed || '—');
      setText('s-eta',   eta   || '—');
      setText('s-size',  size  || '—');
      setText('s-pct',   (percent || 0).toFixed(1) + ' %');

    } else if (status === 'processing') {
      setBarIndeterminate(true);
      setText('vid-title', (title ? title + ' — ' : '') + 'Merging with FFmpeg…');

    } else if (status === 'done') {
      setBarIndeterminate(false);
      setBarWidth(100, true);  // green bar
      setText('s-pct', '100 %');
      document.getElementById('stats').style.opacity = '0.5';
      document.getElementById('msg-done').style.display = 'flex';
      setBtn(false);
      triggerBrowserDownload(currentJobId);

    } else if (status === 'error') {
      setBarIndeterminate(false);
      showError(d.error || 'Download failed.');
      setBtn(false);
    }
  }

  /* ── Trigger browser file download ─────────────────────────────────────── */
  function triggerBrowserDownload(job_id) {
    const a    = document.createElement('a');
    a.href     = '/download/' + job_id;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 1000);
  }

  function retryDownload() {
    if (currentJobId) triggerBrowserDownload(currentJobId);
  }

  /* ── UI helpers ─────────────────────────────────────────────────────────── */
  const BADGE_MAP = {
    starting:    ['badge-starting',    'Starting…'],
    downloading: ['badge-downloading', 'Downloading'],
    processing:  ['badge-processing',  'Processing'],
    done:        ['badge-done',        'Complete'],
    error:       ['badge-error',       'Error'],
  };

  function setBadge(status) {
    const el    = document.getElementById('badge');
    const [cls, label] = BADGE_MAP[status] || ['badge-starting', status];
    el.className = 'badge ' + cls;
    document.getElementById('badge-text').textContent = label;
  }

  function setBarWidth(pct, complete) {
    const bar = document.getElementById('bar');
    bar.style.width = pct + '%';
    bar.classList.toggle('complete', complete);
  }

  function setBarIndeterminate(on) {
    document.getElementById('bar').classList.toggle('indeterminate', on);
  }

  function setText(id, val) {
    document.getElementById(id).textContent = val;
  }

  function showProgressCard(on) {
    document.getElementById('progress-card').classList.toggle('show', on);
  }

  function setBtn(disabled) {
    document.getElementById('dl-btn').disabled = disabled;
  }

  function showError(msg) {
    setBadge('error');
    const el = document.getElementById('msg-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function resetProgressUI() {
    setBadge('starting');
    setText('vid-title', '');
    setText('s-speed', '—');
    setText('s-eta',   '—');
    setText('s-size',  '—');
    setText('s-pct',   '0 %');
    setBarIndeterminate(true);
    setBarWidth(0, false);
    document.getElementById('bar').classList.remove('complete');
    document.getElementById('stats').style.opacity = '1';
    document.getElementById('msg-done').style.display  = 'none';
    document.getElementById('msg-error').style.display = 'none';
  }

  /* Small horizontal shake on empty submit */
  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;   // reflow
    el.style.animation = 'shake .35s ease';
  }

  /* Enter key triggers download */
  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });
</script>

<!-- shake keyframe injected here so it can reference the input border var -->
<style>
  @keyframes shake {
    0%,100%{ transform:translateX(0) }
    20%    { transform:translateX(-6px) }
    40%    { transform:translateX(6px) }
    60%    { transform:translateX(-4px) }
    80%    { transform:translateX(4px) }
  }
  input.shake-active { border-color: var(--err) !important; }
</style>

</body>
</html>
